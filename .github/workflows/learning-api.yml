name: learning-api

on:
  push:
    branches: [main]
    paths:
      - "packages/learning-api/**"

  workflow_dispatch:

env:
  SUBDOMAIN: api.learning
  ROOT_DOMAIN: false
  DOMAIN_SETUP: true
  DOMAIN: ${{ secrets.DOMAIN }}
  PACKAGE_NAME: learning-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_WORKER_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy
          workingDirectory: packages/learning-api

  dns:
    if: true
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Configure Custom Domain
        env:
          CF_TOKEN: ${{ secrets.CF_WORKER_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          if [ "$ROOT_DOMAIN" = "true" ]; then
            FULL_DOMAIN="${DOMAIN}"
            CNAME_NAME="@"
          else
            FULL_DOMAIN="${SUBDOMAIN}.${DOMAIN}"
            CNAME_NAME="${SUBDOMAIN}"
          fi

          WORKER_NAME="${PACKAGE_NAME}"

          echo "Configuring custom domain: ${FULL_DOMAIN} -> ${WORKER_NAME}"
          RESPONSE=$(curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/domains" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"hostname\":\"${FULL_DOMAIN}\",\"service\":\"${WORKER_NAME}\",\"environment\":\"production\",\"zone_id\":\"${CF_ZONE_ID}\",\"zone_name\":\"${DOMAIN}\",\"override_existing_dns_record\":true,\"override_existing_origin\":true}")

          echo "Response: $RESPONSE"

          SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
          if [ "$SUCCESS" = "true" ]; then
            echo "✓ Custom domain configured: https://${FULL_DOMAIN}"
          else
            ERROR=$(echo "$RESPONSE" | jq -r '.errors[0].message // "Unknown"')
            echo "⚠️ Custom domain setup: $ERROR (may already be configured)"
          fi
